<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}PLANZ{% endblock %}</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, -apple-system, sans-serif; background: #f8fafc; color: #1e293b; line-height: 1.6; }
    .container { max-width: 500px; margin: 0 auto; padding: 24px 16px; }
    nav { background: #fff; border-bottom: 1px solid #e2e8f0; margin-bottom: 32px; }
    nav .nav-inner { max-width: 500px; margin: 0 auto; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
    nav a { color: #2563eb; text-decoration: none; font-weight: 500; }
    nav a:hover { text-decoration: underline; }
    .nav-brand { font-weight: 700; font-size: 1.1rem; color: #1e293b; }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 8px; }
    h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 16px; }
    p { color: #475569; margin-bottom: 16px; }
    .card { background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; padding: 24px; margin-bottom: 16px; }
    label { display: block; font-weight: 500; margin-bottom: 6px; color: #374151; }
    input[type=email], input[type=password] {
      display: block; width: 100%; padding: 10px 12px; border: 1px solid #d1d5db;
      border-radius: 8px; font-size: 1rem; margin-bottom: 16px; font-family: inherit;
    }
    input[type=email]:focus, input[type=password]:focus {
      outline: 2px solid #2563eb; outline-offset: -1px; border-color: #2563eb;
    }
    .btn {
      display: inline-block; padding: 10px 20px; background: #2563eb; color: #fff;
      border: none; border-radius: 8px; font-size: 1rem; font-weight: 500;
      cursor: pointer; text-decoration: none; font-family: inherit;
    }
    .btn:hover { background: #1d4ed8; }
    .btn-secondary { background: #fff; color: #374151; border: 1px solid #d1d5db; }
    .btn-secondary:hover { background: #f9fafb; }
    .btn-sm { padding: 6px 14px; font-size: 0.9rem; }
    .error { color: #dc2626; background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 0.9rem; }
    .success { color: #16a34a; background: #f0fdf4; border: 1px solid #bbf7d0; border-radius: 8px; padding: 10px 14px; margin-bottom: 16px; font-size: 0.9rem; }
    .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
    .checkbox-item { display: flex; align-items: center; gap: 8px; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 8px; padding: 10px 12px; cursor: pointer; }
    .checkbox-item input[type=checkbox] { width: 18px; height: 18px; cursor: pointer; accent-color: #2563eb; }
    .checkbox-item label { margin: 0; cursor: pointer; font-weight: 400; }
    .toggle-row { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .toggle-row label { margin: 0; font-weight: 400; }
    .code-box { background: #1e293b; color: #e2e8f0; border-radius: 8px; padding: 14px 16px; font-family: monospace; font-size: 0.85rem; word-break: break-all; margin-bottom: 16px; }
    .text-muted { color: #94a3b8; font-size: 0.9rem; }
    .mt-16 { margin-top: 16px; }
    .mt-8 { margin-top: 8px; }
    a { color: #2563eb; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a class="nav-brand" href="/">PLANZ</a>
      <div>
        {% if user %}
          <form method="post" action="/logout" style="display:inline">
            <button type="submit" class="btn btn-secondary btn-sm">Sign out</button>
          </form>
        {% else %}
          <a href="/login">Sign in</a>
        {% endif %}
      </div>
    </div>
  </nav>
  <div class="container">
    {% block content %}{% endblock %}
  </div>
</body>
</html>
