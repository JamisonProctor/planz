services:
  web:
    build: { context: ., target: web }
    ports: ["8000:8000"]
    volumes: [./data:/app/data]
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  worker:
    build: { context: ., target: worker }
    volumes: [./data:/app/data]
    env_file: .env
    profiles: [worker]
    restart: "no"

  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run
    environment: [TUNNEL_TOKEN=${CLOUDFLARE_TUNNEL_TOKEN}]
    profiles: [tunnel]
    restart: unless-stopped
    depends_on: [web]
